name: Build and Publish Docker Image

on:
  # Daily build — only actually builds/pushes if check-for-changes finds
  # commits since the last successful build (see the check-for-changes job
  # below), so this caps Docker image builds at once per 24h no matter how
  # many changes land on main in between. Midnight UTC.
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: {}

concurrency:
  # A manual dispatch and a scheduled run racing each other would both try
  # to move the docker-build-marker tag and push to the same image tags.
  group: build-docker-image
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  check-for-changes:
    # DISABLED while other repo changes are landing — remove this line to
    # re-enable (build-and-push depends on this job's outputs, so disabling
    # just this one is enough to disable the whole workflow).
    if: false
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      has_changes: ${{ steps.changelog.outputs.has_changes }}
      oneline: ${{ steps.changelog.outputs.oneline }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history + tags, needed to diff against the previous build's
          # marker tag.
          fetch-depth: 0

      - name: List changes since the last build
        id: changelog
        # docker-build-marker is moved to HEAD at the end of every build that
        # actually runs (see build-and-push), so this always covers exactly
        # what's new since the image now on ghcr.io was built. No marker yet
        # (first-ever run) always counts as "has changes", to establish one.
        # A manual run always counts as "has changes" too, so workflow_dispatch
        # can force a rebuild for testing regardless of whether anything changed.
        run: |
          if git rev-parse -q --verify refs/tags/docker-build-marker >/dev/null; then
            RANGE="docker-build-marker..HEAD"
            HAS_MARKER=true
          else
            RANGE="$(git rev-list --max-parents=0 HEAD)..HEAD"
            HAS_MARKER=false
          fi

          COUNT=$(git rev-list --count "$RANGE" 2>/dev/null || echo 0)

          if [ "$HAS_MARKER" = true ] && [ "$COUNT" -eq 0 ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            HAS_CHANGES=false
          else
            HAS_CHANGES=true
          fi

          MULTI=$(git log "$RANGE" --pretty=format:'- %s (%h)' | head -n 30)
          if [ -z "$MULTI" ]; then
            MULTI="No commits since the last image build."
          fi

          # Single-line, semicolon-joined form for the OCI description label —
          # a label value can't safely contain literal newlines.
          ONELINE=$(git log "$RANGE" --pretty=format:'%s (%h)' | head -n 30 | paste -sd '; ' -)
          if [ -z "$ONELINE" ]; then
            ONELINE="No commits since the last image build."
          fi
          # Keep the label from growing unbounded.
          ONELINE=$(echo "$ONELINE" | cut -c1-1000)

          echo "has_changes=$HAS_CHANGES" >> "$GITHUB_OUTPUT"
          {
            echo "oneline<<EOF"
            echo "$ONELINE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## Changes since the last image build"
            echo ""
            echo "$MULTI"
            echo ""
            echo "**Will build/push a new image:** $HAS_CHANGES"
          } >> "$GITHUB_STEP_SUMMARY"

  build-and-push:
    needs: check-for-changes
    if: needs.check-for-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate changelog.json from merged PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: .github/scripts/generate-changelog.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short
          labels: |
            org.opencontainers.image.description=${{ needs.check-for-changes.outputs.oneline }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile.server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64

      - name: Move last-build marker to this commit
        run: |
          git tag -f docker-build-marker
          git push origin docker-build-marker --force
