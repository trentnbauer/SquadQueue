name: Build and Publish Docker Image

on:
  # Daily build — only actually builds/pushes if check-for-changes finds
  # commits since the last successful build (see the check-for-changes job
  # below), so this caps Docker image builds at once per 24h no matter how
  # many changes land on main in between. Midnight UTC.
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: {}

concurrency:
  # A manual dispatch and a scheduled run racing each other would both try
  # to move the docker-build-marker tag and push to the same image tags.
  group: build-docker-image
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  check-for-changes:
    # DISABLED while other repo changes are landing — remove this line to
    # re-enable (build-and-push depends on this job's outputs, so disabling
    # just this one is enough to disable the whole workflow).
    if: true
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      has_changes: ${{ steps.changelog.outputs.has_changes }}
      oneline: ${{ steps.changelog.outputs.oneline }}
      image_name: ${{ steps.image_name.outputs.image_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history + tags, needed to diff against the previous build's
          # marker tag.
          fetch-depth: 0

      # ghcr.io image refs must be lowercase, but github.repository preserves
      # the repo's actual casing (trentnbauer/QueueUp) - lowercase it once
      # here so every job downstream uses a ref Docker will accept.
      - name: Compute lowercase image name
        id: image_name
        run: echo "image_name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: List changes since the last build
        id: changelog
        # docker-build-marker is moved to HEAD at the end of every build that
        # actually runs (see build-and-push), so this always covers exactly
        # what's new since the image now on ghcr.io was built. No marker yet
        # (first-ever run) always counts as "has changes", to establish one.
        # A manual run always counts as "has changes" too, so workflow_dispatch
        # can force a rebuild for testing regardless of whether anything changed.
        run: |
          if git rev-parse -q --verify refs/tags/docker-build-marker >/dev/null; then
            RANGE="docker-build-marker..HEAD"
            HAS_MARKER=true
          else
            RANGE="$(git rev-list --max-parents=0 HEAD)..HEAD"
            HAS_MARKER=false
          fi

          COUNT=$(git rev-list --count "$RANGE" 2>/dev/null || echo 0)

          if [ "$HAS_MARKER" = true ] && [ "$COUNT" -eq 0 ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            HAS_CHANGES=false
          else
            HAS_CHANGES=true
          fi

          MULTI=$(git log "$RANGE" --pretty=format:'- %s (%h)' | head -n 30)
          if [ -z "$MULTI" ]; then
            MULTI="No commits since the last image build."
          fi

          # Single-line, semicolon-joined form for the OCI description label —
          # a label value can't safely contain literal newlines.
          ONELINE=$(git log "$RANGE" --pretty=format:'%s (%h)' | head -n 30 | paste -sd '; ' -)
          if [ -z "$ONELINE" ]; then
            ONELINE="No commits since the last image build."
          fi
          # Keep the label from growing unbounded.
          ONELINE=$(echo "$ONELINE" | cut -c1-1000)

          echo "has_changes=$HAS_CHANGES" >> "$GITHUB_OUTPUT"
          {
            echo "oneline<<EOF"
            echo "$ONELINE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## Changes since the last image build"
            echo ""
            echo "$MULTI"
            echo ""
            echo "**Will build/push a new image:** $HAS_CHANGES"
          } >> "$GITHUB_STEP_SUMMARY"

  # Builds each platform on a runner that's actually that architecture, instead of one job doing
  # both via docker/setup-qemu-action - QEMU-emulated npm ci/tsc/vite build/esbuild (this Dockerfile
  # compiles TypeScript and runs a full Vite build inside the image) run several times slower than
  # native, which was the single biggest cost in this workflow. Each leg pushes its image by digest
  # only (no tags yet); `merge` below combines both digests into one multi-arch manifest and applies
  # the real tags to that.
  build:
    needs: check-for-changes
    if: needs.check-for-changes.outputs.has_changes == 'true'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            # GitHub-hosted native arm64 runner (no QEMU) - see
            # https://docs.github.com/actions/using-github-hosted-runners/about-github-hosted-runners/about-github-hosted-runners#standard-github-hosted-runners-for-public-repositories
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate changelog.json from merged PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: .github/scripts/generate-changelog.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sanitize platform for cache scope/artifact names
        id: platform
        run: echo "slug=${PLATFORM//\//-}" >> "$GITHUB_OUTPUT"
        env:
          PLATFORM: ${{ matrix.platform }}

      - name: Build and push image by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile.server
          platforms: ${{ matrix.platform }}
          # GitHub Actions cache backend, scoped per platform so the amd64 and arm64 legs don't
          # thrash each other's cache entries (their layers differ). `mode=max` also caches
          # intermediate build-stage layers (deps/build/prod-deps), not just the final image, so an
          # unrelated source change still reuses the `npm ci` layers from the last run.
          cache-from: type=gha,scope=${{ steps.platform.outputs.slug }}
          cache-to: type=gha,mode=max,scope=${{ steps.platform.outputs.slug }}
          build-args: |
            APP_VERSION=build-${{ github.run_number }}
            APP_SHA=${{ github.sha }}
          # Labels get baked into each per-arch image now, not applied later - `imagetools create`
          # below only assembles a manifest list pointing at these already-pushed digests, it can't
          # retroactively add labels to an image that's already been pushed.
          labels: |
            org.opencontainers.image.description=${{ needs.check-for-changes.outputs.oneline }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ needs.check-for-changes.outputs.image_name }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ steps.platform.outputs.slug }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Combines the amd64 and arm64 images (pushed by digest above, untagged) into one multi-arch
  # manifest list and applies the real tags/labels to that - this is the step that actually makes
  # `docker pull ghcr.io/.../queueup:latest` transparently resolve to the right architecture.
  merge:
    needs: [check-for-changes, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ needs.check-for-changes.outputs.image_name }}
          # The bare `run_number` tag (last line) is a plain incrementing integer -
          # Renovate's default `docker` versioning scheme recognizes that as an ascending
          # version and can open PRs to bump a compose file pinned to it. The `build-<N>`
          # tag above is the same number, but Renovate's default versioning won't parse
          # that prefixed form as a version, so it won't trigger updates on its own.
          tags: |
            type=raw,value=latest
            type=sha,format=short
            type=raw,value=build-${{ github.run_number }}
            type=raw,value=${{ github.run_number }}
          labels: |
            org.opencontainers.image.description=${{ needs.check-for-changes.outputs.oneline }}

      - name: Create and push multi-arch manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ needs.check-for-changes.outputs.image_name }}@sha256:%s ' *)
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}

      - name: Inspect pushed manifest
        run: docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ needs.check-for-changes.outputs.image_name }}:latest

      - name: Move last-build marker to this commit
        run: |
          git tag -f docker-build-marker
          git push origin docker-build-marker --force
