name: Tests

# Runs the Vitest suite (server/web/shared pure-logic tests — see README:
# "no DB/network integration tests").
#
# This job is a required status check on main, so it must trigger and report
# a status on every PR — a paths: filter on `on:` would make GitHub Actions
# skip queuing the run entirely for unrelated PRs (docs, workflow YAML),
# which leaves the required check permanently pending and blocks merging.
# Instead the job always runs, and skips the actual test steps internally
# when no relevant files changed.
on:
  pull_request:
  push:
    branches: [main]
    paths:
      - "packages/**"
      - "server/**"
      - "web/**"
      - "package.json"
      - "package-lock.json"
      - "vitest.config.ts"
      - "vitest.setup.ts"

permissions:
  contents: read

jobs:
  test:
    name: test
    # DISABLED while other repo changes are landing — remove this line to re-enable.
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for relevant changes
        id: filter
        if: github.event_name == 'pull_request'
        run: |
          if git diff --name-only "origin/${{ github.base_ref }}...HEAD" | grep -qE '^(packages/|server/|web/|package(-lock)?\.json|vitest\.(config|setup)\.ts)'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: github.event_name != 'pull_request' || steps.filter.outputs.relevant == 'true'
        with:
          node-version: 22

      - name: Install dependencies
        if: github.event_name != 'pull_request' || steps.filter.outputs.relevant == 'true'
        run: npm ci

      - name: Generate Prisma client
        # gameAccess.test.ts imports db/client.ts, which instantiates
        # PrismaClient at module load time — that throws unless the
        # generated client exists, same as the Dockerfile's own
        # `prisma generate` step before its build.
        if: github.event_name != 'pull_request' || steps.filter.outputs.relevant == 'true'
        run: npx prisma generate --schema server/src/db/prisma/schema.prisma

      - name: Build shared package
        # server/web import types (and, transitively, runtime code) from
        # @queueup/shared, which resolves through its built dist/ (see
        # packages/shared/package.json "main"/"types") — same build the
        # predev script runs before local dev.
        if: github.event_name != 'pull_request' || steps.filter.outputs.relevant == 'true'
        run: npm run build -w packages/shared

      - name: Write a dummy .env for env-schema validation
        # server/src/config/env.ts validates process.env at import time
        # (imported transitively by several test files via redisClient.ts
        # etc.) and calls process.exit(1) if required vars are missing —
        # same reason vitest.setup.ts loads a root .env locally. No real
        # secrets needed since these are pure-logic tests with no DB/network
        # calls; DEV_FAKE_AUTH=true skips the sign-in-method check.
        if: github.event_name != 'pull_request' || steps.filter.outputs.relevant == 'true'
        run: |
          cat > .env <<'EOF'
          PORT=3000
          APP_BASE_URL=http://localhost:5173
          DATABASE_URL=postgresql://test:test@localhost:5432/test
          REDIS_URL=redis://localhost:6379
          SESSION_SECRET=ci-dummy-session-secret-value
          DEV_FAKE_AUTH=true
          GGDEALS_API_KEY=ci-dummy-key
          IGDB_CLIENT_ID=ci-dummy-client-id
          IGDB_CLIENT_SECRET=ci-dummy-client-secret
          ADMIN_EMAILS=
          EOF

      - name: Run tests
        if: github.event_name != 'pull_request' || steps.filter.outputs.relevant == 'true'
        run: npm test
