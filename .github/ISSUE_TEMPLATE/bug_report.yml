name: Bug report
description: Something in QueueUp is broken or not working as expected.
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: false

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the app is affected?
      options:
        - Personal Shelf
        - Communal Rooms
        - Sidebar / room navigation
        - Room Settings
        - Profile Settings
        - Game intake (search / Add Game / gg.deals link paste)
        - Game status (Backlog / Playing / Done)
        - Pricing / metadata refresh
        - Price drop alerts
        - Voting (emoji scale)
        - Spin the Wheel
        - Steam library import
        - Notifications
        - Auth / sign-in
        - Dark / light mode
        - Accessibility
        - UI / layout / responsiveness
        - Performance
        - Docker / deployment
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Server logs, browser console errors, or screenshots. Redact any API keys or tokens.
      render: shell
    validations:
      required: false

  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: e.g. self-hosted via docker compose, commit abc1234, Chrome on Windows
    validations:
      required: false
