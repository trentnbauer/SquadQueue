name: squadqueue

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-squadqueue}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-squadqueue}
    volumes:
      - ${DATA_DIR:-./data}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-squadqueue}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ${DATA_DIR:-./data}/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    # Pulls the pre-built image from the "Build and Publish Docker Image" GitHub Actions workflow
    # (.github/workflows/build-docker-image.yml) instead of building locally - that workflow
    # already builds and pushes linux/amd64+linux/arm64 on every change to main, so there's no
    # need to rebuild here. Override IMAGE_TAG to pin a specific commit (tagged `sha-<short>`)
    # instead of always tracking `latest`.
    image: ghcr.io/trentnbauer/queueup:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-squadqueue}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-squadqueue}
      REDIS_URL: redis://redis:6379
      PORT: 3000
      APP_BASE_URL: ${APP_BASE_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      TRUST_PROXY: ${TRUST_PROXY:-true}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI}
      OIDC_SCOPES: ${OIDC_SCOPES:-openid profile email}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      DISCORD_REDIRECT_URI: ${DISCORD_REDIRECT_URI}
      STEAM_API_KEY: ${STEAM_API_KEY}
      STEAM_REDIRECT_URI: ${STEAM_REDIRECT_URI}
      DEV_FAKE_AUTH: ${DEV_FAKE_AUTH:-false}
      ADMIN_EMAILS: ${ADMIN_EMAILS}
      GGDEALS_API_KEY: ${GGDEALS_API_KEY}
      GGDEALS_DEFAULT_REGION: ${GGDEALS_DEFAULT_REGION:-us}
      IGDB_CLIENT_ID: ${IGDB_CLIENT_ID}
      IGDB_CLIENT_SECRET: ${IGDB_CLIENT_SECRET}
    ports:
      - "${PORT:-3000}:3000"
    healthcheck:
      # node:22-alpine has no curl/wget - Node's built-in fetch avoids adding a package just for this.
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/healthz').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
